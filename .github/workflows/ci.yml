# Аналог примера из лекции 1
name: CI
# События-триггеры (как в лекции)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # ручной запуск
# Права (минимальные, как в лекции 4)
permissions:
  contents: read
# Отмена старых запусков (как в лекции 1)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Задача 1: тесты (как в лекции 1 и 2)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest test_hello.py -v
          echo "Все тесты пройдены!"
      
      - name: Run application
        run: |
          python src/hello.py
