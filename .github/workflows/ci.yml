name: CI
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'                     # Автокэш от setup-python!
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Cache pip packages (ручной кэш, как в лекции 4)
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-
      
      - name: Проверка кэша (как в лекции 4)
        if: steps.cache-pip.outputs.cache-hit == 'true'
        run: echo "✅ Кэш pip восстановлен!"
      
      - name: Run tests
        run: pytest test_hello.py -v
